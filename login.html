<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capital One – Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --accent: #00E5FF;
            --accent-glow: rgba(0, 229, 255, 0.3);
            --dark: #0A0E1A;
            --dark-card: #111827;
            --text-primary: #FFFFFF;
            --text-secondary: #94A3B8;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--dark);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Background Effects */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background-image: 
                linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }

        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            opacity: 0.12;
            z-index: 0;
            animation: orbFloat 20s ease-in-out infinite alternate;
        }

        .bg-orb.orb1 {
            width: 500px;
            height: 500px;
            top: -20%;
            right: -10%;
            background: radial-gradient(circle, rgba(0, 229, 255, 0.15) 0%, transparent 70%);
        }

        .bg-orb.orb2 {
            width: 300px;
            height: 300px;
            bottom: -10%;
            left: -10%;
            background: radial-gradient(circle, rgba(124, 58, 237, 0.15) 0%, transparent 70%);
            animation-delay: -7s;
        }

        @keyframes orbFloat {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, -40px) scale(1.1); }
        }

        /* ===== LOGIN CONTAINER ===== */
        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            animation: slideUp 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .login-container {
            background: var(--glass-bg);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 32px;
            width: 100%;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6), 0 0 60px var(--accent-glow);
        }

        /* ===== HEADER ===== */
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-header .logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 28px;
            font-weight: 700;
            text-decoration: none;
            color: var(--text-primary);
            margin-bottom: 16px;
        }

        .login-header .logo .icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: linear-gradient(135deg, #00E5FF, #7C3AED);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: var(--dark);
            box-shadow: 0 0 30px var(--accent-glow);
            flex-shrink: 0;
        }

        .login-header .logo span {
            background: linear-gradient(135deg, #00E5FF, #7C3AED);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-header h2 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .login-header p {
            color: var(--text-secondary);
            font-size: 15px;
        }

        /* ===== TABS ===== */
        .tabs {
            display: flex;
            gap: 4px;
            background: var(--glass-bg);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 24px;
            border: 1px solid var(--glass-border);
        }

        .tab {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Space Grotesk', sans-serif;
            background: transparent;
            color: var(--text-secondary);
            text-align: center;
        }

        .tab.active {
            background: var(--glass-bg);
            color: var(--text-primary);
            border: 1px solid var(--glass-border);
        }

        .tab:hover:not(.active) {
            color: var(--text-primary);
        }

        /* ===== FORM SECTIONS ===== */
        .form-section {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .form-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== FORM GROUPS ===== */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .form-group .input-wrapper {
            position: relative;
        }

        .form-group .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 16px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px 12px 44px;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            background: var(--glass-bg);
            color: var(--text-primary);
            font-size: 15px;
            font-family: 'Space Grotesk', sans-serif;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--accent);
            outline: none;
            box-shadow: 0 0 0 4px var(--accent-glow);
        }

        .form-group input::placeholder {
            color: var(--text-secondary);
        }

        .form-group .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 18px;
            padding: 4px;
        }

        .form-group .password-toggle:hover {
            color: var(--text-primary);
        }

        /* ===== FORM ROW ===== */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        /* ===== FORM OPTIONS ===== */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 16px 0 20px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .form-options label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .form-options a {
            color: var(--accent);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .form-options a:hover {
            color: #7C3AED;
        }

        /* ===== BUTTON ===== */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Space Grotesk', sans-serif;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.6s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00E5FF, #7C3AED);
            color: var(--dark);
            box-shadow: 0 0 30px var(--accent-glow);
        }

        .btn-primary:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 0 50px var(--accent-glow);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* ===== ALERT ===== */
        .alert {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            display: none;
            font-size: 14px;
            font-weight: 500;
        }

        .alert.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .alert-error {
            background: rgba(255, 107, 107, 0.15);
            color: #FF6B6B;
            border: 1px solid rgba(255, 107, 107, 0.3);
        }

        .alert-success {
            background: rgba(0, 229, 255, 0.15);
            color: #00E5FF;
            border: 1px solid rgba(0, 229, 255, 0.3);
        }

        .alert-info {
            background: rgba(124, 58, 237, 0.15);
            color: #7C3AED;
            border: 1px solid rgba(124, 58, 237, 0.3);
        }

        /* ===== FORM FOOTER ===== */
        .form-footer {
            text-align: center;
            margin-top: 20px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .form-footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
        }

        .form-footer a:hover {
            color: #7C3AED;
        }

        /* ===== PASSWORD STRENGTH ===== */
        .strength-bar {
            height: 4px;
            border-radius: 4px;
            background: var(--glass-bg);
            margin-top: 6px;
            overflow: hidden;
        }

        .strength-bar .fill {
            height: 100%;
            transition: all 0.3s ease;
            width: 0%;
            border-radius: 4px;
        }

        .strength-text {
            font-size: 12px;
            margin-top: 4px;
            color: var(--text-secondary);
        }

        .strength-text.weak { color: #FF6B6B; }
        .strength-text.medium { color: #FFA94D; }
        .strength-text.strong { color: #00E5FF; }

        /* ===== TERMS CHECK ===== */
        .terms-check {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-size: 13px;
            color: var(--text-secondary);
            margin: 12px 0 16px;
        }

        .terms-check input[type="checkbox"] {
            margin-top: 2px;
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--accent);
            flex-shrink: 0;
        }

        .terms-check a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }

        .terms-check a:hover {
            color: #7C3AED;
        }

        /* ===== OTP INPUTS ===== */
        .otp-inputs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }

        .otp-inputs input {
            width: 50px;
            height: 60px;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            border: 2px solid var(--glass-border);
            border-radius: 12px;
            background: var(--glass-bg);
            color: var(--text-primary);
            font-family: 'Space Grotesk', sans-serif;
            transition: all 0.3s ease;
            outline: none;
        }

        .otp-inputs input:focus {
            border-color: var(--accent);
            outline: none;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 520px) {
            body {
                padding: 12px;
            }

            .login-container {
                padding: 28px 18px;
                border-radius: 18px;
            }

            .login-header .logo {
                font-size: 22px;
            }

            .login-header .logo .icon {
                width: 38px;
                height: 38px;
                font-size: 18px;
            }

            .login-header h2 {
                font-size: 22px;
            }

            .login-header p {
                font-size: 14px;
            }

            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }

            .tabs .tab {
                font-size: 13px;
                padding: 8px 12px;
            }

            .form-group input,
            .form-group select {
                font-size: 14px;
                padding: 10px 14px 10px 40px;
            }

            .form-group .input-wrapper i {
                font-size: 14px;
                left: 12px;
            }

            .otp-inputs {
                gap: 6px;
            }

            .otp-inputs input {
                width: 40px;
                height: 50px;
                font-size: 20px;
            }

            .btn {
                font-size: 14px;
                padding: 12px;
            }

            .form-options {
                flex-direction: column;
                align-items: flex-start;
            }

            .form-options label {
                font-size: 13px;
            }

            .form-options a {
                font-size: 13px;
            }
        }

        @media (max-width: 380px) {
            .login-container {
                padding: 20px 14px;
                border-radius: 14px;
            }

            .login-header .logo {
                font-size: 20px;
            }

            .login-header .logo .icon {
                width: 34px;
                height: 34px;
                font-size: 16px;
            }

            .login-header h2 {
                font-size: 20px;
            }

            .tabs .tab {
                font-size: 12px;
                padding: 6px 8px;
            }

            .otp-inputs input {
                width: 34px;
                height: 44px;
                font-size: 18px;
            }
        }

        @media (min-width: 521px) and (max-width: 768px) {
            .login-container {
                padding: 32px 24px;
            }

            .form-row {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (min-width: 769px) {
            .login-wrapper {
                max-width: 500px;
            }
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: var(--dark);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <!-- Background -->
    <div class="bg-grid"></div>
    <div class="bg-orb orb1"></div>
    <div class="bg-orb orb2"></div>

    <!-- Login Container -->
    <div class="login-wrapper">
        <div class="login-container">
            <!-- Header -->
            <div class="login-header">
                <a href="/" class="logo">
                    <div class="icon"><i class="fas fa-bolt"></i></div>
                    Capital<span>One</span>
                </a>
                <h2 id="formTitle">Welcome Back</h2>
                <p id="formSubtitle">Sign in to your account</p>
            </div>

            <!-- Tabs -->
            <div class="tabs">
                <button class="tab active" onclick="switchTab('login')" id="loginTab">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
                <button class="tab" onclick="switchTab('register')" id="registerTab">
                    <i class="fas fa-user-plus"></i> Register
                </button>
            </div>

            <!-- ===== LOGIN FORM ===== -->
            <div class="form-section active" id="loginSection">
                <div id="loginAlert" class="alert"></div>
                <form onsubmit="handleLogin(event)" id="loginForm">
                    <div class="form-group">
                        <label>Email Address</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="loginEmail" placeholder="you@example.com" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="loginPassword" placeholder="Enter your password" required>
                            <button type="button" class="password-toggle" onclick="togglePassword('loginPassword')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="form-options">
                        <label>
                            <input type="checkbox" id="rememberMe"> Remember me
                        </label>
                        <a onclick="showForgotPassword()">Forgot Password?</a>
                    </div>
                    <button type="submit" class="btn btn-primary" id="loginBtn">
                        <i class="fas fa-sign-in-alt"></i> Sign In
                    </button>
                </form>
                <div class="form-footer">
                    Don't have an account?
                    <a onclick="switchTab('register')">Create one now</a>
                </div>
            </div>

            <!-- ===== REGISTER FORM ===== -->
            <div class="form-section" id="registerSection">
                <div id="registerAlert" class="alert"></div>
                <form onsubmit="handleRegister(event)" id="registerForm">
                    <div class="form-group">
                        <label>Full Name</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user"></i>
                            <input type="text" id="regName" placeholder="John Doe" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="regEmail" placeholder="you@example.com" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <div class="input-wrapper">
                            <i class="fas fa-phone"></i>
                            <input type="tel" id="regPhone" placeholder="+1 234 567 890" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Create Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="regPassword" placeholder="Min 8 characters" required minlength="8" oninput="checkPasswordStrength(this.value)">
                            <button type="button" class="password-toggle" onclick="togglePassword('regPassword')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <div class="strength-bar">
                            <div class="fill" id="strengthFill"></div>
                        </div>
                        <div class="strength-text" id="strengthText">Password must be at least 8 characters</div>
                    </div>
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-check-circle"></i>
                            <input type="password" id="regConfirmPassword" placeholder="Confirm your password" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Set 4-Digit PIN</label>
                        <div class="input-wrapper">
                            <i class="fas fa-key"></i>
                            <input type="password" id="regPin" placeholder="1234" maxlength="4" required pattern="\d{4}">
                        </div>
                    </div>
                    <div class="terms-check">
                        <input type="checkbox" id="regTerms" required>
                        <label for="regTerms">
                            I agree to the 
                            <a href="#">Terms of Service</a> and 
                            <a href="#">Privacy Policy</a>
                        </label>
                    </div>
                    <button type="submit" class="btn btn-primary" id="registerBtn">
                        <i class="fas fa-user-plus"></i> Create Account
                    </button>
                </form>
                <div class="form-footer">
                    Already have an account?
                    <a onclick="switchTab('login')">Sign in here</a>
                </div>
            </div>

            <!-- ===== FORGOT PASSWORD ===== -->
            <div class="form-section" id="forgotSection">
                <div id="forgotAlert" class="alert"></div>
                <form onsubmit="handleForgotPassword(event)">
                    <div class="form-group">
                        <label>Email Address</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="forgotEmail" placeholder="you@example.com" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary" id="forgotBtn">
                        <i class="fas fa-paper-plane"></i> Send Reset Link
                    </button>
                </form>
                <div class="form-footer">
                    <a onclick="switchTab('login')"><i class="fas fa-arrow-left"></i> Back to Sign In</a>
                </div>
            </div>

            <!-- ===== OTP VERIFICATION ===== -->
            <div class="form-section" id="otpSection">
                <div id="otpAlert" class="alert"></div>
                <p style="text-align:center;color:var(--text-secondary);margin-bottom:16px;">
                    Enter the 6-digit code sent to your email
                </p>
                <div class="otp-inputs">
                    <input type="text" maxlength="1" oninput="handleOTP(this, 0)" id="otp0">
                    <input type="text" maxlength="1" oninput="handleOTP(this, 1)" id="otp1">
                    <input type="text" maxlength="1" oninput="handleOTP(this, 2)" id="otp2">
                    <input type="text" maxlength="1" oninput="handleOTP(this, 3)" id="otp3">
                    <input type="text" maxlength="1" oninput="handleOTP(this, 4)" id="otp4">
                    <input type="text" maxlength="1" oninput="handleOTP(this, 5)" id="otp5">
                </div>
                <button onclick="verifyOTP()" class="btn btn-primary" id="otpBtn">
                    <i class="fas fa-check"></i> Verify
                </button>
                <div class="form-footer">
                    Didn't receive the code?
                    <a onclick="resendOTP()">Resend</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ===== STATE =====
        let currentTab = 'login';
        let generatedOTP = '';
        let tempUserData = null;

        // ===== TAB SWITCHING =====
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(tab + 'Tab').classList.add('active');
            document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
            document.getElementById(tab + 'Section').classList.add('active');

            const titles = {
                login: ['Welcome Back', 'Sign in to your account'],
                register: ['Create Account', 'Start your journey today'],
                forgot: ['Reset Password', 'We\'ll send you a reset link'],
                otp: ['Verify Email', 'Enter the verification code']
            };

            document.getElementById('formTitle').textContent = titles[tab][0];
            document.getElementById('formSubtitle').textContent = titles[tab][1];

            document.querySelectorAll('.alert').forEach(a => {
                a.className = 'alert';
                a.style.display = 'none';
            });
        }

        // ===== TOGGLE PASSWORD =====
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const icon = input.parentElement.querySelector('.password-toggle i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }

        // ===== PASSWORD STRENGTH =====
        function checkPasswordStrength(password) {
            const fill = document.getElementById('strengthFill');
            const text = document.getElementById('strengthText');
            let strength = 0;
            if (password.length >= 8) strength++;
            if (password.match(/[a-z]/)) strength++;
            if (password.match(/[A-Z]/)) strength++;
            if (password.match(/[0-9]/)) strength++;
            if (password.match(/[^a-zA-Z0-9]/)) strength++;
            const percent = (strength / 5) * 100;
            fill.style.width = percent + '%';
            if (password.length === 0) {
                fill.style.background = '#333';
                text.textContent = 'Password must be at least 8 characters';
                text.className = 'strength-text';
            } else if (strength <= 2) {
                fill.style.background = '#FF6B6B';
                text.textContent = 'Weak password';
                text.className = 'strength-text weak';
            } else if (strength <= 3) {
                fill.style.background = '#FFA94D';
                text.textContent = 'Medium password';
                text.className = 'strength-text medium';
            } else if (strength <= 4) {
                fill.style.background = '#00E5FF';
                text.textContent = 'Strong password';
                text.className = 'strength-text strong';
            } else {
                fill.style.background = '#7C3AED';
                text.textContent = 'Very strong password!';
                text.className = 'strength-text strong';
            }
        }

        // ===== OTP HANDLING =====
        function handleOTP(input, index) {
            if (input.value.length === 1 && index < 5) {
                document.getElementById('otp' + (index + 1)).focus();
            }
            const allFilled = document.querySelectorAll('.otp-inputs input');
            let filled = true;
            allFilled.forEach(el => { if (!el.value) filled = false; });
            if (filled) verifyOTP();
        }

        function showOTPVerification() {
            switchTab('otp');
            generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
            console.log('📱 Your OTP is:', generatedOTP);
            showAlert('otpAlert', 'Code sent! For demo, your OTP is: ' + generatedOTP, 'info');
        }

        function verifyOTP() {
            const inputs = document.querySelectorAll('.otp-inputs input');
            let entered = '';
            inputs.forEach(el => entered += el.value);
            if (entered.length !== 6) {
                showAlert('otpAlert', 'Please enter all 6 digits', 'error');
                return;
            }
            if (entered === generatedOTP) {
                showAlert('otpAlert', '✅ Email verified successfully!', 'success');
                setTimeout(() => completeRegistration(), 1000);
            } else {
                showAlert('otpAlert', '❌ Invalid OTP. Please try again.', 'error');
                document.querySelectorAll('.otp-inputs input').forEach(el => el.value = '');
                document.getElementById('otp0').focus();
            }
        }

        function resendOTP() {
            generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
            console.log('📱 New OTP:', generatedOTP);
            showAlert('otpAlert', 'New code sent! OTP: ' + generatedOTP, 'info');
            document.querySelectorAll('.otp-inputs input').forEach(el => el.value = '');
            document.getElementById('otp0').focus();
        }

        // ===== SHOW ALERT =====
        function showAlert(id, message, type) {
            const el = document.getElementById(id);
            if (!el) return;
            el.textContent = message;
            el.className = 'alert alert-' + type + ' show';
            el.style.display = 'block';
        }

        // ===== SHOW FORGOT PASSWORD =====
        function showForgotPassword() {
            switchTab('forgot');
        }

        // ===== HANDLE LOGIN =====
        async function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');

            if (!email || !password) {
                showAlert('loginAlert', 'Please fill in all fields', 'error');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error || 'Login failed');
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                showAlert('loginAlert', '✅ Login successful! Redirecting...', 'success');
                setTimeout(() => window.location.href = '/dashboard.html', 1000);
            } catch (error) {
                showAlert('loginAlert', error.message || 'Login failed', 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
            }
        }

        // ===== HANDLE REGISTER =====
        async function handleRegister(event) {
            event.preventDefault();
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const phone = document.getElementById('regPhone').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirmPassword').value;
            const pin = document.getElementById('regPin').value;
            const terms = document.getElementById('regTerms').checked;
            const btn = document.getElementById('registerBtn');

            if (!name || !email || !phone || !password || !confirm || !pin) {
                showAlert('registerAlert', 'Please fill in all fields', 'error');
                return;
            }
            if (password !== confirm) {
                showAlert('registerAlert', 'Passwords do not match', 'error');
                return;
            }
            if (password.length < 8) {
                showAlert('registerAlert', 'Password must be at least 8 characters', 'error');
                return;
            }
            if (!/^\d{4}$/.test(pin)) {
                showAlert('registerAlert', 'PIN must be 4 digits', 'error');
                return;
            }
            if (!terms) {
                showAlert('registerAlert', 'Please agree to the Terms of Service', 'error');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account...';

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, phone, password, pin })
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error || 'Registration failed');
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                showAlert('registerAlert', '✅ Account created! Redirecting...', 'success');
                setTimeout(() => window.location.href = '/dashboard.html', 1000);
            } catch (error) {
                showAlert('registerAlert', error.message || 'Registration failed', 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
            }
        }

        // ===== COMPLETE REGISTRATION =====
        async function completeRegistration() {
            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(tempUserData)
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error || 'Registration failed');
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                showAlert('otpAlert', '✅ Registration complete! Redirecting...', 'success');
                setTimeout(() => window.location.href = '/dashboard.html', 1000);
            } catch (error) {
                showAlert('otpAlert', error.message || 'Registration failed', 'error');
            }
        }

        // ===== HANDLE FORGOT PASSWORD =====
        async function handleForgotPassword(event) {
            event.preventDefault();
            const email = document.getElementById('forgotEmail').value.trim();
            const btn = document.getElementById('forgotBtn');
            if (!email) {
                showAlert('forgotAlert', 'Please enter your email', 'error');
                return;
            }
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
            setTimeout(() => {
                showAlert('forgotAlert', '✅ Reset link sent to your email!', 'success');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Reset Link';
                setTimeout(() => switchTab('login'), 2000);
            }, 1500);
        }

        // ===== CHECK AUTH =====
        document.addEventListener('DOMContentLoaded', function() {
            const token = localStorage.getItem('token');
            if (token) {
                fetch('/api/dashboard/demo-user', {
                    headers: { 'Authorization': 'Bearer ' + token }
                }).then(r => {
                    if (r.ok) window.location.href = '/dashboard.html';
                }).catch(() => {
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                });
            }

            // Set max date for DOB if exists
            const dobInput = document.getElementById('regDob');
            if (dobInput) {
                const today = new Date();
                const minDate = new Date(today.getFullYear() - 18, today.getMonth(), today.getDate());
                dobInput.max = minDate.toISOString().split('T')[0];
            }
        });

        // Expose functions
        window.switchTab = switchTab;
        window.togglePassword = togglePassword;
        window.handleLogin = handleLogin;
        window.handleRegister = handleRegister;
        window.handleForgotPassword = handleForgotPassword;
        window.showForgotPassword = showForgotPassword;
        window.handleOTP = handleOTP;
        window.verifyOTP = verifyOTP;
        window.resendOTP = resendOTP;
        window.checkPasswordStrength = checkPasswordStrength;
    </script>
</body>
</html>
